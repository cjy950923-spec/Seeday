# GitHub Pages — 정적 사이트 (node_modules 제외)
# 저장소: Settings → Pages → Build and deployment: Source = GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=_site \
            --exclude='.github' \
            --exclude='**/.DS_Store' \
            ./ _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
