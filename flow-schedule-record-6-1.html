    <script type="module">
      import { iconAssets } from "./tokens/icon.js";
      import { initDragToScroll } from "./screens/schedule-record-6-1-drag.mjs";
      import { initScheduleRecordPicker } from "./screens/schedule-record-6-1-picker.mjs";
      import { initAlarmSheet } from "./screens/schedule-record-6-1-alarm-sheet.mjs";
      import { initRepeatSheet } from "./screens/schedule-record-6-1-repeat-sheet.mjs";
      import { initColorSheet } from "./screens/schedule-record-6-1-color-sheet.mjs";

      function href(rel) {
        return new URL(rel, import.meta.url).href;
      }

      const map = {
        close: iconAssets.close,
        calendar: iconAssets.calendar,
        notification: iconAssets.notification,
        repeat: iconAssets.repeat,
        compass: iconAssets.compass,
        palette: iconAssets.palette,
        article: iconAssets.article,
        arrowRightLarge: iconAssets.arrowRightLarge,
        arrowRightMedium: iconAssets.arrowRightMedium,
        arrowLeftLarge: iconAssets.arrowLeftLarge,
        checkSmall: iconAssets.checkSmall,
      };

      document.querySelectorAll("[data-icon]").forEach((el) => {
        const key = el.getAttribute("data-icon");
        if (map[key]) el.src = href(map[key]);
      });

      const ta = document.getElementById("sd6Memo");
      const n = document.getElementById("sd6MemoN");
      const memoField = document.getElementById("sd6MemoField");
      const submitBtn = document.getElementById("sd6SubmitBtn");
      const titleInput = document.getElementById("sd6TitleInput");
      const nameWrap = document.querySelector(".sd6_1__nameRow .sdTextInputField");
      const locationInput = document.getElementById("sd6LocationInput");
      const locationWrap = document.querySelector(".sd6_1__locationRow .sdTextInputField");
      /** 메모(공백 포함) 또는 일정명(앞뒤 공백 제외, 비공백 1자 이상) */
      function syncSubmitButton() {
        if (!submitBtn) return;
        const hasMemo = Boolean(ta && ta.value.length > 0);
        const hasTitle = Boolean(titleInput && titleInput.value.trim().length > 0);
        const hasLocation = Boolean(locationInput && locationInput.value.trim().length > 0);
        const active = hasMemo || hasTitle || hasLocation;
        submitBtn.disabled = !active;
        submitBtn.classList.toggle("sdBtn--normal", !active);
        submitBtn.classList.toggle("sdBtn--success", active);
      }
      const syncTitleField = () => {
        if (!nameWrap || !titleInput) return;
        const has = titleInput.value.trim().length > 0;
        nameWrap.classList.toggle("sdTextInputField--pressed", has);
        nameWrap.classList.toggle("sdTextInputField--default", !has);
        syncSubmitButton();
      };
      if (titleInput) {
        titleInput.addEventListener("input", syncTitleField);
        syncTitleField();
      }

      // Location field: Ghost(Default/Completed) — text 있으면 Completed(=Medium), 없으면 Default(=Regular)
      const syncLocationField = () => {
        if (!locationWrap || !locationInput) return;
        const has = locationInput.value.trim().length > 0;
        locationWrap.classList.toggle("sdTextInputField--completed", has);
        locationWrap.classList.toggle("sdTextInputField--default", !has);
        syncSubmitButton();
      };
      if (locationInput) {
        locationInput.addEventListener("input", syncLocationField);
        locationInput.addEventListener("compositionend", syncLocationField);
        syncLocationField();
      }

      if (ta) {
        ta.addEventListener("input", () => {
          if (n) n.textContent = String(ta.value.length);
          if (memoField) {
            const has = ta.value.length > 0;
            memoField.classList.toggle("sdContentsField--pressed", has);
            memoField.classList.toggle("sdContentsField--default", !has);
          }
          syncSubmitButton();
        });
      }
      if (memoField && ta) {
        const has = ta.value.length > 0;
        memoField.classList.toggle("sdContentsField--pressed", has);
        memoField.classList.toggle("sdContentsField--default", !has);
      }
      syncSubmitButton();

      const scroller = document.querySelector(".sd6_1__scroll");
      if (scroller) initDragToScroll(scroller);

      const allDayBtn = document.getElementById("sd6AllDayToggle");
      const dateTimeBlock = document.getElementById("sd6DateTimeBlock");
      if (allDayBtn) {
        const sync = () => {
          const on = allDayBtn.getAttribute("aria-pressed") === "true";
          allDayBtn.setAttribute("aria-label", on ? "하루 종일 켬" : "하루 종일 끔");
          allDayBtn.classList.toggle("sdToggle--on", on);
          /* .sd6_1__timeRow { display:flex }가 [hidden]보다 강해 래퍼로 강제 비표시 (Figma 6-3) */
          if (dateTimeBlock) dateTimeBlock.hidden = on;
        };
        allDayBtn.addEventListener("click", () => {
          const on = allDayBtn.getAttribute("aria-pressed") === "true";
          allDayBtn.setAttribute("aria-pressed", on ? "false" : "true");
          sync();
        });
        sync();
      }

      initScheduleRecordPicker({
        startPoint: document.getElementById("sd6StartPoint"),
        endPoint: document.getElementById("sd6EndPoint"),
        startDate: document.getElementById("sd6StartDate"),
        startDow: document.getElementById("sd6StartDow"),
        startAmpm: document.getElementById("sd6StartAmpm"),
        startClock: document.getElementById("sd6StartClock"),
        endDate: document.getElementById("sd6EndDate"),
        endDow: document.getElementById("sd6EndDow"),
        endAmpm: document.getElementById("sd6EndAmpm"),
        endClock: document.getElementById("sd6EndClock"),
        pickerBlock: document.getElementById("sd6PickerBlock"),
        completeBtn: document.getElementById("sd6PickerComplete"),
        allDayBtn: allDayBtn,
        dateTimeBlock,
      });

      const closeRepeatRef = { fn: () => {} };
      const closeColorRef = { fn: () => {} };
      const alarmSheet = initAlarmSheet({
        overlay: document.getElementById("sd6AlarmOverlay"),
        openBtn: document.getElementById("sd6AlarmOpenBtn"),
        doneBtn: document.getElementById("sd6AlarmDoneBtn"),
        valueEl: document.getElementById("sd6AlarmValue"),
        optionButtons: document.querySelectorAll("#sd6AlarmCard .sd6_1__alarmOption[data-alarm-value]"),
        onBeforeOpen: () => {
          closeRepeatRef.fn();
          closeColorRef.fn();
        },
      });
      const repeatSheet = initRepeatSheet({
        overlay: document.getElementById("sd6RepeatOverlay"),
        openBtn: document.getElementById("sd6RepeatOpenBtn"),
        doneBtn: document.getElementById("sd6RepeatDoneBtn"),
        valueEl: document.getElementById("sd6RepeatValue"),
        freqButtons: document.querySelectorAll("#sd6RepeatFreqCard [data-repeat-freq]"),
        endReveal: document.getElementById("sd6RepeatEndReveal"),
        endCard: document.getElementById("sd6RepeatEndCard"),
        endToggle: document.getElementById("sd6RepeatEndToggle"),
        endFrame87: document.getElementById("sd6RepeatEndFrame87"),
        endDateField: document.getElementById("sd6RepeatEndDateField"),
        endDateText: document.getElementById("sd6RepeatEndDateText"),
        endWheels: document.getElementById("sd6RepeatEndWheels"),
        endPickerRow: document.getElementById("sd6RepeatEndPickerRow"),
        endPickerDone: document.getElementById("sd6RepeatEndPickerDone"),
        onBeforeOpen: () => {
          alarmSheet?.close();
          closeColorRef.fn();
        },
      });
      const colorSheet = initColorSheet({
        overlay: document.getElementById("sd6ColorOverlay"),
        root: document.getElementById("sd6RecordRoot"),
        openBtn: document.getElementById("sd6ColorOpenBtn"),
        backBtn: document.getElementById("sd6ColorBackBtn"),
        doneBtn: document.getElementById("sd6ColorDoneBtn"),
        swatchButtons: document.querySelectorAll("#sd6ColorCard .sd6_1__colorOption[data-schedule-color]"),
        onBeforeOpen: () => {
          alarmSheet?.close();
          closeRepeatRef.fn();
        },
      });
      if (repeatSheet) closeRepeatRef.fn = repeatSheet.close;
      if (colorSheet) closeColorRef.fn = colorSheet.close;
    </script>
